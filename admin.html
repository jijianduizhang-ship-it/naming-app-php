<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智能起名 - 管理后台</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: "PingFang SC", "Microsoft YaHei", sans-serif; background: #f5f7fa; color: #333; }
        
        .login-page { min-height: 100vh; display: flex; align-items: center; justify-content: center; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
        .login-box { background: white; padding: 40px; border-radius: 16px; width: 400px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); }
        .login-title { font-size: 28px; font-weight: bold; text-align: center; margin-bottom: 30px; color: #667eea; }
        
        .form-group { margin-bottom: 20px; }
        .form-label { display: block; font-size: 14px; color: #666; margin-bottom: 8px; }
        .form-input { width: 100%; height: 44px; padding: 0 16px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; }
        .form-input:focus { border-color: #667eea; outline: none; }
        
        .btn { height: 44px; background: linear-gradient(135deg, #667eea, #764ba2); border: none; border-radius: 8px; color: white; font-size: 16px; cursor: pointer; width: 100%; }
        .btn:hover { opacity: 0.9; }
        
        .admin-page { display: none; }
        .sidebar { position: fixed; left: 0; top: 0; width: 220px; height: 100vh; background: #2c3e50; color: white; padding: 20px 0; }
        .sidebar-title { font-size: 20px; font-weight: bold; text-align: center; padding: 0 20px 20px; border-bottom: 1px solid #34495e; }
        .sidebar-menu { margin-top: 20px; }
        .menu-item { padding: 14px 24px; cursor: pointer; transition: all 0.3s; display: flex; align-items: center; gap: 10px; }
        .menu-item:hover, .menu-item.active { background: #34495e; }
        .menu-item .icon { font-size: 18px; }
        
        .main { margin-left: 220px; padding: 20px; min-height: 100vh; }
        .header { background: white; padding: 16px 24px; border-radius: 8px; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .header-title { font-size: 20px; font-weight: bold; }
        .header-user { color: #666; }
        .logout-btn { color: #e74c3c; cursor: pointer; margin-left: 20px; }
        
        .content { background: white; padding: 24px; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        
        .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 30px; }
        .stat-card { background: linear-gradient(135deg, #667eea, #764ba2); padding: 20px; border-radius: 12px; color: white; }
        .stat-label { font-size: 14px; opacity: 0.9; }
        .stat-value { font-size: 32px; font-weight: bold; margin-top: 8px; }
        
        .stat-card.green { background: linear-gradient(135deg, #11998e, #38ef7d); }
        .stat-card.orange { background: linear-gradient(135deg, #f093fb, #f5576c); }
        .stat-card.blue { background: linear-gradient(135deg, #4facfe, #00f2fe); }
        
        .table { width: 100%; border-collapse: collapse; }
        .table th, .table td { padding: 12px; text-align: left; border-bottom: 1px solid #f0f0f0; }
        .table th { background: #f8f9fa; font-weight: 600; color: #666; }
        .table tr:hover { background: #f8f9fa; }
        
        .tag { padding: 4px 10px; border-radius: 4px; font-size: 12px; }
        .tag-success { background: #d4edda; color: #155724; }
        .tag-danger { background: #f8d7da; color: #721c24; }
        .tag-primary { background: #cce5ff; color: #004085; }
        
        .action-btn { padding: 6px 12px; border: none; border-radius: 4px; cursor: pointer; font-size: 12px; margin-right: 8px; }
        .action-btn.primary { background: #667eea; color: white; }
        .action-btn.danger { background: #e74c3c; color: white; }
        .action-btn.success { background: #27ae60; color: white; }
        
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); align-items: center; justify-content: center; z-index: 1000; }
        .modal.show { display: flex; }
        .modal-content { background: white; padding: 30px; border-radius: 12px; width: 500px; max-width: 90%; }
        .modal-title { font-size: 18px; font-weight: bold; margin-bottom: 20px; }
        .modal-btns { display: flex; gap: 10px; margin-top: 20px; }
        .modal-btns .btn { flex: 1; }
        
        .pagination { display: flex; gap: 8px; margin-top: 20px; justify-content: center; }
        .pagination button { padding: 8px 16px; border: 1px solid #ddd; background: white; border-radius: 4px; cursor: pointer; }
        .pagination button.active { background: #667eea; color: white; border-color: #667eea; }
        
        .form-row { display: flex; gap: 16px; margin-bottom: 16px; }
        .form-row .form-group { flex: 1; }
        
        .chart-container { height: 300px; margin-top: 20px; }
        
        .config-item { padding: 16px; border: 1px solid #eee; border-radius: 8px; margin-bottom: 12px; }
        .config-item label { display: block; font-weight: 600; margin-bottom: 8px; }
        
        .toast { position: fixed; top: 20px; right: 20px; background: #27ae60; color: white; padding: 12px 24px; border-radius: 8px; display: none; z-index: 2000; }
        .toast.show { display: block; }
        .toast.error { background: #e74c3c; }
    </style>
</head>
<body>
    <!-- 登录页 -->
    <div class="login-page" id="loginPage">
        <div class="login-box">
            <div class="login-title">管理后台</div>
            <div class="form-group">
                <label class="form-label">用户名</label>
                <input type="text" class="form-input" id="username" placeholder="请输入用户名">
            </div>
            <div class="form-group">
                <label class="form-label">密码</label>
                <input type="password" class="form-input" id="password" placeholder="请输入密码">
            </div>
            <button class="btn" onclick="login()">登录</button>
        </div>
    </div>
    
    <!-- 管理后台 -->
    <div class="admin-page" id="adminPage">
        <div class="sidebar">
            <div class="sidebar-title">智能起名后台</div>
            <div class="sidebar-menu">
                <div class="menu-item active" onclick="showPage('dashboard')">
                    <span class="icon">📊</span><span>数据概览</span>
                </div>
                <div class="menu-item" onclick="showPage('users')">
                    <span class="icon">👥</span><span>用户管理</span>
                </div>
                <div class="menu-item" onclick="showPage('codes')">
                    <span class="icon">🎫</span><span>兑换码管理</span>
                </div>
                <div class="menu-item" onclick="showPage('records')">
                    <span class="icon">📝</span><span>起名记录</span>
                </div>
                <div class="menu-item" onclick="showPage('configs')">
                    <span class="icon">⚙️</span><span>系统配置</span>
                </div>
            </div>
        </div>
        
        <div class="main">
            <div class="header">
                <div class="header-title" id="pageTitle">数据概览</div>
                <div class="header-user">
                    <span id="adminUsername">管理员</span>
                    <span class="logout-btn" onclick="logout()">退出登录</span>
                </div>
            </div>
            
            <div class="content" id="pageContent">
                <!-- 页面内容 -->
            </div>
        </div>
    </div>
    
    <!-- 弹窗 -->
    <div class="modal" id="modal">
        <div class="modal-content">
            <div class="modal-title" id="modalTitle">标题</div>
            <div id="modalBody"></div>
            <div class="modal-btns">
                <button class="btn" onclick="closeModal()">取消</button>
                <button class="btn" id="modalConfirmBtn" style="background: #27ae60;">确定</button>
            </div>
        </div>
    </div>
    
    <div class="toast" id="toast"></div>
    
    <script>
        const API_BASE = 'https://qm.imoons.cn/api/index.php';
        let token = localStorage.getItem('admin_token');
        
        // 检查登录状态
        if (token) {
            showAdminPage();
        }
        
        async function login() {
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            if (!username || !password) {
                showToast('请输入用户名和密码', true);
                return;
            }
            try {
                const res = await fetch(API_BASE + '/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                const data = await res.json();
                if (data.token) {
                    token = data.token;
                    localStorage.setItem('admin_token', token);
                    localStorage.setItem('admin_username', data.username);
                    showAdminPage();
                } else {
                    showToast(data.error || '登录失败', true);
                }
            } catch (e) {
                showToast('网络错误', true);
            }
        }
        
        function logout() {
            token = null;
            localStorage.removeItem('admin_token');
            localStorage.removeItem('admin_username');
            document.getElementById('loginPage').style.display = 'flex';
            document.getElementById('adminPage').style.display = 'none';
        }
        
        function showAdminPage() {
            document.getElementById('loginPage').style.display = 'none';
            document.getElementById('adminPage').style.display = 'block';
            document.getElementById('adminUsername').textContent = localStorage.getItem('admin_username') || '管理员';
            showPage('dashboard');
        }
        
        let currentPage = 'dashboard';
        
        async function showPage(page) {
            currentPage = page;
            document.querySelectorAll('.menu-item').forEach(item => item.classList.remove('active'));
            event?.target?.closest('.menu-item')?.classList.add('active');
            
            const titles = { dashboard: '数据概览', users: '用户管理', codes: '兑换码管理', records: '起名记录', configs: '系统配置' };
            document.getElementById('pageTitle').textContent = titles[page];
            
            if (page === 'dashboard') await loadDashboard();
            else if (page === 'users') await loadUsers();
            else if (page === 'codes') await loadCodes();
            else if (page === 'records') await loadRecords();
            else if (page === 'configs') await loadConfigs();
        }
        
        async function api(endpoint, options = {}) {
            const res = await fetch(API_BASE + endpoint, {
                ...options,
                headers: { 'Content-Type': 'application/json', ...options.headers, 'Authorization': 'Bearer ' + token }
            });
            return res.json();
        }
        
        // 数据概览
        async function loadDashboard() {
            const data = await api('/stats');
            document.getElementById('pageContent').innerHTML = `
                <div class="stats-grid">
                    <div class="stat-card">
                        <div class="stat-label">总用户数</div>
                        <div class="stat-value">${data.users?.total || 0}</div>
                    </div>
                    <div class="stat-card green">
                        <div class="stat-label">今日起名</div>
                        <div class="stat-value">${data.today?.records || 0}</div>
                    </div>
                    <div class="stat-card orange">
                        <div class="stat-label">累计起名</div>
                        <div class="stat-value">${data.records?.total || 0}</div>
                    </div>
                    <div class="stat-card blue">
                        <div class="stat-label">兑换码总量</div>
                        <div class="stat-value">${data.codes?.total || 0}</div>
                    </div>
                </div>
                <h3 style="margin-bottom: 16px;">近7天趋势</h3>
                <table class="table">
                    <thead><tr><th>日期</th><th>起名次数</th></tr></thead>
                    <tbody>
                        ${(data.trend || []).map(t => `<tr><td>${t.date}</td><td>${t.count}</td></tr>`).join('') || '<tr><td colspan="2">暂无数据</td></tr>'}
                    </tbody>
                </table>
            `;
        }
        
        // 用户管理
        async function loadUsers() {
            const data = await api('/users');
            document.getElementById('pageContent').innerHTML = `
                <div style="margin-bottom: 16px; display: flex; gap: 10px;">
                    <input type="text" class="form-input" id="userKeyword" placeholder="搜索昵称/openid" style="width: 200px;">
                    <button class="btn" style="width: auto; padding: 0 20px;" onclick="loadUsers()">搜索</button>
                </div>
                <table class="table">
                    <thead><tr><th>ID</th><th>昵称</th><th>OpenID</th><th>余额</th><th>累计使用</th><th>状态</th><th>注册时间</th><th>操作</th></tr></thead>
                    <tbody>
                        ${(data.list || []).map(u => `
                            <tr>
                                <td>${u.id}</td>
                                <td>${u.nickname || '-'}</td>
                                <td>${u.openid || '-'}</td>
                                <td>${u.credits}</td>
                                <td>${u.total_used}</td>
                                <td><span class="tag ${u.status === 1 ? 'tag-success' : 'tag-danger'}">${u.status === 1 ? '正常' : '禁用'}</span></td>
                                <td>${u.created_at?.slice(0,10) || '-'}</td>
                                <td>
                                    <button class="action-btn ${u.status === 1 ? 'danger' : 'success'}" onclick="toggleUser(${u.id}, ${u.status})">${u.status === 1 ? '禁用' : '启用'}</button>
                                    <button class="action-btn primary" onclick="editUserCredits(${u.id}, ${u.credits})">修改余额</button>
                                </td>
                            </tr>
                        `).join('') || '<tr><td colspan="8">暂无数据</td></tr>'}
                    </tbody>
                </table>
            `;
        }
        
        async function toggleUser(id, status) {
            const data = await api(`/users/${id}/toggle`, { method: 'POST' });
            if (data.success) loadUsers();
        }
        
        function editUserCredits(id, current) {
            document.getElementById('modalTitle').textContent = '修改用户余额';
            document.getElementById('modalBody').innerHTML = `
                <div class="form-group">
                    <label class="form-label">新余额</label>
                    <input type="number" class="form-input" id="newCredits" value="${current}">
                </div>
            `;
            document.getElementById('modalConfirmBtn').onclick = async () => {
                const credits = parseInt(document.getElementById('newCredits').value);
                await api(`/users/${id}/credits`, { method: 'POST', body: JSON.stringify({ credits }) });
                closeModal();
                loadUsers();
            };
            showModal();
        }
        
        // 兑换码管理
        async function loadCodes() {
            const data = await api('/codes');
            document.getElementById('pageContent').innerHTML = `
                <div style="margin-bottom: 16px;">
                    <button class="btn" style="width: auto; padding: 0 20px;" onclick="showCreateCodeModal()">+ 生成兑换码</button>
                </div>
                <table class="table">
                    <thead><tr><th>ID</th><th>兑换码</th><th>次数</th><th>已使用</th><th>状态</th><th>创建者</th><th>过期时间</th><th>创建时间</th><th>操作</th></tr></thead>
                    <tbody>
                        ${(data.list || []).map(c => `
                            <tr>
                                <td>${c.id}</td>
                                <td><code style="background: #f0f0f0; padding: 4px 8px; border-radius: 4px;">${c.code}</code></td>
                                <td>${c.amount}</td>
                                <td>${c.used_count}/${c.max_use === 0 ? '不限' : c.max_use}</td>
                                <td><span class="tag ${c.status === 1 ? 'tag-success' : 'tag-danger'}">${c.status === 1 ? '正常' : '禁用'}</span></td>
                                <td>${c.creator_name || '-'}</td>
                                <td>${c.expired_at?.slice(0,10) || '永不过期'}</td>
                                <td>${c.created_at?.slice(0,10) || '-'}</td>
                                <td>
                                    <button class="action-btn ${c.status === 1 ? 'danger' : 'success'}" onclick="toggleCode(${c.id}, ${c.status})">${c.status === 1 ? '禁用' : '启用'}</button>
                                </td>
                            </tr>
                        `).join('') || '<tr><td colspan="9">暂无数据</td></tr>'}
                    </tbody>
                </table>
            `;
        }
        
        function showCreateCodeModal() {
            document.getElementById('modalTitle').textContent = '生成兑换码';
            document.getElementById('modalBody').innerHTML = `
                <div class="form-row">
                    <div class="form-group">
                        <label class="form-label">兑换次数</label>
                        <input type="number" class="form-input" id="codeAmount" value="10">
                    </div>
                    <div class="form-group">
                        <label class="form-label">最大使用次数</label>
                        <input type="number" class="form-input" id="codeMaxUse" value="1">
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label class="form-label">生成数量</label>
                        <input type="number" class="form-input" id="codeCount" value="1">
                    </div>
                    <div class="form-group">
                        <label class="form-label">过期时间(可选)</label>
                        <input type="date" class="form-input" id="codeExpire">
                    </div>
                </div>
            `;
            document.getElementById('modalConfirmBtn').onclick = async () => {
                const amount = parseInt(document.getElementById('codeAmount').value);
                const maxUse = parseInt(document.getElementById('codeMaxUse').value);
                const count = parseInt(document.getElementById('codeCount').value);
                const expiredAt = document.getElementById('codeExpire').value || null;
                const data = await api('/codes', {
                    method: 'POST',
                    body: JSON.stringify({ amount, maxUse, count, expiredAt })
                });
                if (data.success) {
                    closeModal();
                    showToast(`成功生成 ${data.codes.length} 个兑换码`);
                    loadCodes();
                }
            };
            showModal();
        }
        
        async function toggleCode(id, status) {
            const data = await api(`/codes/${id}/toggle`, { method: 'POST' });
            if (data.success) loadCodes();
        }
        
        // 起名记录
        async function loadRecords() {
            const data = await api('/records');
            document.getElementById('pageContent').innerHTML = `
                <div style="margin-bottom: 16px; display: flex; gap: 10px;">
                    <select class="form-input" id="recordGender" style="width: 120px;" onchange="loadRecords()">
                        <option value="">全部性别</option>
                        <option value="boy">男宝宝</option>
                        <option value="girl">女宝宝</option>
                    </select>
                    <input type="date" class="form-input" id="recordStart" style="width: 150px;" onchange="loadRecords()">
                    <input type="date" class="form-input" id="recordEnd" style="width: 150px;" onchange="loadRecords()">
                </div>
                <table class="table">
                    <thead><tr><th>ID</th><th>用户</th><th>姓氏</th><th>性别</th><th>出生日期</th><th>字数</th><th>来源</th><th>时间</th></tr></thead>
                    <tbody>
                        ${(data.list || []).map(r => `
                            <tr>
                                <td>${r.id}</td>
                                <td>${r.nickname || r.openid?.slice(0,8) || '-'}</td>
                                <td>${r.surname}</td>
                                <td>${r.gender === 'boy' ? '男' : '女'}</td>
                                <td>${r.birthday}</td>
                                <td>${r.name_length}字</td>
                                <td><span class="tag tag-primary">${r.source === 'ai' ? 'AI' : '本地'}</span></td>
                                <td>${r.created_at?.slice(0,16) || '-'}</td>
                            </tr>
                        `).join('') || '<tr><td colspan="8">暂无数据</td></tr>'}
                    </tbody>
                </table>
            `;
        }
        
        // 系统配置
        async function loadConfigs() {
            const data = await api('/configs');
            document.getElementById('pageContent').innerHTML = `
                <div class="config-item">
                    <label>AI API 地址</label>
                    <input type="text" class="form-input" id="configApiUrl" value="${data.ai_api_url || ''}">
                </div>
                <div class="config-item">
                    <label>AI API 密钥</label>
                    <input type="text" class="form-input" id="configApiKey" value="${data.ai_api_key || ''}">
                </div>
                <div class="config-item">
                    <label>AI 模型</label>
                    <input type="text" class="form-input" id="configModel" value="${data.ai_model || 'deepseek-chat'}">
                </div>
                <button class="btn" onclick="saveConfigs()">保存配置</button>
            `;
        }
        
        async function saveConfigs() {
            const configs = [
                { key: 'ai_api_url', value: document.getElementById('configApiUrl').value, description: 'AI API 地址' },
                { key: 'ai_api_key', value: document.getElementById('configApiKey').value, description: 'AI API 密钥' },
                { key: 'ai_model', value: document.getElementById('configModel').value, description: 'AI 模型名称' }
            ];
            for (const config of configs) {
                await api('/configs', { method: 'POST', body: JSON.stringify(config) });
            }
            showToast('配置保存成功');
        }
        
        function showModal() {
            document.getElementById('modal').classList.add('show');
        }
        
        function closeModal() {
            document.getElementById('modal').classList.remove('show');
        }
        
        function showToast(msg, isError = false) {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.className = 'toast show' + (isError ? ' error' : '');
            setTimeout(() => toast.classList.remove('show'), 3000);
        }
    </script>
</body>
</html>
